<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>{{ name }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h2>Peer Chat: {{ name }}</h2>
        <div class="buttons">
            <button onclick="register()">Register</button>
            <button onclick="loadPeers()">Load Peers</button>
        </div>

        <ul id="peers" class="peer-list"></ul>

        <hr>
        <div class="chat-box">
            <input id="msg" placeholder="Message..." class="msg-input">
            <button onclick="sendMsg()">Broadcast</button>
            <ul id="chat" class="chat-log"></ul>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
